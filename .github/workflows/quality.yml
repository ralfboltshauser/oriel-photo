name: Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, test, and Linux E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @oriel/desktop exec playwright install --with-deps chromium
      - run: pnpm quality
      - run: xvfb-run -a pnpm --filter @oriel/desktop test:e2e
      - run: pnpm --filter @oriel/desktop test:visual
      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-report
          path: |
            apps/desktop/playwright-report
            apps/desktop/test-results
          retention-days: 7

  package-smoke:
    name: Package ${{ matrix.os }}
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @oriel/desktop package:dir
